name: Build_iOS
on: [push]

jobs:
  build:
    runs-on: macos-latest 
    steps:
      - uses: actions/checkout@v4

      - name: Setup_Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install_Tools
        run: |
          # Instalamos las piezas que le faltan a la Mac de GitHub
          brew install autoconf automake libtool pkg-config
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy-ios

      - name: Build_IPA
        run: |
          # Si tus archivos estan dentro de la carpeta Appfacturation,
          # descomenta la siguiente linea quitandole el '#'
          # cd Appfacturation
          buildozer ios debug
        
      - name: Upload_Result
        uses: actions/upload-artifact@v4
        with:
          name: App-Mao-Tech
          path: bin/*.ipa
