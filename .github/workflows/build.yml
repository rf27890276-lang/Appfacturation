name: Build_iOS
on: [push]

jobs:
  build:
    runs-on: macos-latest 
    steps:
      - uses: actions/checkout@v4

      - name: Setup_Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install_Tools
        run: |
          brew install autoconf automake libtool pkg-config
          pip install --upgrade pip
          # Añadimos 'packaging' que es lo que pidió el error
          pip install Cython==0.29.33 buildozer kivy-ios packaging setuptools

      - name: Build_IPA
        run: |
          # Si tus archivos estan en la carpeta Appfacturation, entra a ella
          if [ -d "Appfacturation" ]; then cd Appfacturation; fi
          buildozer ios debug
        
      - name: Upload_Result
        uses: actions/upload-artifact@v4
        with:
          name: App-Mao-Tech
          path: |
            bin/*.ipa
            Appfacturation/bin/*.ipa
