name: Build_iOS
on: [push]

jobs:
  build:
    # Usamos la version mas estable de sus Macs
    runs-on: macos-latest 
    steps:
      - uses: actions/checkout@v4

      - name: Setup_Python
        uses: actions/setup-python@v5
        with:
          # Python 3.11 es el estandar ahora en sus servidores
          python-version: '3.11'

      - name: Install_System_Tools
        run: |
          brew install autoconf automake libtool pkg-config
          # Instalamos solo lo esencial para que no de error de espacio
          pip install --upgrade pip
          pip install Cython buildozer kivy-ios

      - name: Build_IPA
        run: |
          # El comando magico que usa la Acer para mandarle la orden
          buildozer ios debug
        
      - name: Upload_Result
        uses: actions/upload-artifact@v4
        with:
          name: App-Mao-Tech
          path: bin/*.ipa
