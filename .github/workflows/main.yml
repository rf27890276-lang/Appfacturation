name: Build_iOS
on: [push]

jobs:
  build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v3

      - name: Setup_Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install_Tools
        run: |
          python -m pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy kivy-ios

      - name: Build_IPA
        run: |
          buildozer ios debug
        
      - name: Upload_Artifact
        uses: actions/upload-artifact@v3
        with:
          name: App-Mao-Tech
          path: bin/*.ipa
