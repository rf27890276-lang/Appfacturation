name: Build IPA
on: [push]

jobs:
  build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Herramientas de Apple
        run: |
          brew install autoconf automake libtool pkg-config
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer kivy

      - name: Cocinar el IPA
        run: |
          # Esto inicia la fabricacion para iOS
          buildozer ios debug
        
      - name: Descargar Resultado
        uses: actions/upload-artifact@v3
        with:
          name: App-Facturacion-Mao
          path: bin/*.ipa
